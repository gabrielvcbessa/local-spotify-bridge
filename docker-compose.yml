services:
  spotify-bridge:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-8090}:8090"
    environment:
      DATA_PATH: /data/bridge-state.json
    volumes:
      - bridge-data:/data
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    profiles: ["mqtt"]
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  bridge-data:
