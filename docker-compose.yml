services:
  spotify-bridge:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-8090}:8090"
    environment:
      DATA_PATH: /data/bridge-state.json
      ART_CACHE_MAX_AGE_SECONDS: "${ART_CACHE_MAX_AGE_SECONDS:-604800}"
      ART_CACHE_MAX_BYTES: "${ART_CACHE_MAX_BYTES:-1073741824}"
      ART_MEMORY_CACHE_MAX_AGE_SECONDS: "${ART_MEMORY_CACHE_MAX_AGE_SECONDS:-86400}"
      ART_MEMORY_CACHE_MAX_BYTES: "${ART_MEMORY_CACHE_MAX_BYTES:-1073741824}"
    volumes:
      - bridge-data:/data
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    profiles: ["mqtt"]
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  bridge-data:
